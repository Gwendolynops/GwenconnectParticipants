<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>GwenConnect Participants</title>

  <link rel="icon" type="image/png"
  href="https://raw.githubusercontent.com/Gwendolynops/GwenconnectParticipants/main/staff_sign_in_app_icon_512.png">

  <style>

    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:#0f2d52;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
      text-align:center;
    }

    .card{
      background:white;
      color:#0f2d52;
      padding:50px;
      border-radius:24px;
      width:min(90%,500px);
      box-shadow:0 20px 50px rgba(0,0,0,.25);
    }

    img{
      width:120px;
      margin-bottom:20px;
    }

    h1{
      margin:0 0 10px;
      font-size:36px;
    }

    p{
      opacity:.8;
      margin-bottom:30px;
      line-height:1.5;
    }

    a{
      display:inline-block;
      background:#0f2d52;
      color:white;
      padding:14px 24px;
      border-radius:12px;
      text-decoration:none;
      font-weight:bold;
    }

    a:hover{
      opacity:.9;
    }

  </style>

</head>
<body>

  <div class="card">

    <img src="https://raw.githubusercontent.com/Gwendolynops/GwenconnectParticipants/main/staff_sign_in_app_icon_512.png">

    <h1>GwenConnect Participants</h1>

    <p>
      NDIS Participant & Compliance Platform
      for incident reporting, shift notes,
      restrictive practice tracking and
      operational compliance.
    </p>

    <a href="https://script.google.com/macros/s/AKfycbxfoSrMNWcODCRWDj8KjbMFiFet9Mdp8i_BLcML8gE-xDOTJVj_-xgmeM1Xri_QMv9MKQ/exec">
